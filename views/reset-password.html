<div class="auth-page">
    <div class="auth-card">
        <div class="auth-left">
            <div class="auth-left-content">
                <img src="assets/images/LogolargoCoderBoost.png" alt="CoderBoost" class="auth-logo">
                <h1 class="auth-tagline">Boost Your<br>Programming Skills</h1>
                <p class="auth-desc">Set a new password for your account.</p>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-right-content">
                <form class="auth-form" id="reset-form">
                    <div class="verify-icon">
                        <i class="bi bi-lock"></i>
                    </div>
                    <h2>Set New Password</h2>
                    <p class="auth-subtitle">Choose a strong password for your account</p>
                    <div class="auth-input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="reset-password" placeholder="New password" required>
                    </div>
                    <div class="auth-input-group">
                        <i class="fa-solid fa-check-double input-icon"></i>
                        <input type="password" id="reset-confirm" placeholder="Confirm new password" required>
                    </div>
                    <div id="reset-error" class="auth-error hidden"></div>
                    <div id="reset-success" class="auth-success hidden"></div>
                    <button type="submit" class="auth-btn">Reset Password</button>
                    <div class="auth-alt-action">
                        <span>Remember now?</span>
                        <button type="button" class="auth-link-btn" id="back-to-login-from-reset">Sign In</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
